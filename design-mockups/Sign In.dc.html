<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box}
  body{margin:0}
  a{color:#F5330A;text-decoration:none}
  a:hover{color:#ff7a4d}
  input::placeholder{color:#6e6d6a}
  input:focus{outline:none;border-color:rgba(255,120,60,0.55)!important}
  @keyframes lj-in{from{opacity:0;transform:translateY(16px) scale(.985)}to{opacity:1;transform:none}}
  @keyframes lj-out{from{opacity:1;transform:none}to{opacity:0;transform:translateY(-14px) scale(.985)}}
  @keyframes lj-draw{from{stroke-dashoffset:100}to{stroke-dashoffset:0}}
  @keyframes lj-chip{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .lj-in{animation:lj-in .6s cubic-bezier(.22,.61,.36,1) both}
  .lj-out{animation:lj-out .5s cubic-bezier(.4,0,.2,1) both}
  .lj-stroke{stroke-dasharray:100;stroke-dashoffset:100;animation:lj-draw 3.55s cubic-bezier(.45,0,.22,1) forwards}
  .lj-strokefull{stroke-dasharray:100;stroke-dashoffset:0}
  .lj-chip{opacity:0;animation:lj-chip .5s cubic-bezier(.22,.61,.36,1) forwards}
  @media(prefers-reduced-motion:reduce){.lj-in,.lj-out,.lj-stroke,.lj-chip{animation:none!important}.lj-stroke{stroke-dashoffset:0!important}.lj-chip{opacity:1!important}}
</style>
<style>@media(max-width:860px){.si-grid{grid-template-columns:1fr!important}.si-left{display:none!important}.si-right{min-height:100vh!important}}</style>
<style id="oc-btn-system">
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:700;letter-spacing:-0.01em;line-height:1;border:none;border-radius:12px;cursor:pointer;text-decoration:none;white-space:nowrap;position:relative;isolation:isolate;-webkit-tap-highlight-color:transparent;transition:transform .18s cubic-bezier(.2,.8,.3,1),box-shadow .2s ease,filter .2s ease,border-color .2s ease,background .2s ease,color .2s ease}
.btn>svg{flex:none;transition:transform .18s cubic-bezier(.2,.8,.3,1)}
.btn:focus-visible{outline:none;box-shadow:0 0 0 3px var(--bg,#141312),0 0 0 5px rgba(245,60,20,0.75)}
.btn--lg{height:54px;padding:0 30px;font-size:16px}
.btn--md{height:46px;padding:0 22px;font-size:15px}
.btn--sm{height:38px;padding:0 16px;font-size:13.5px}
.btn--block{width:100%}
.btn--primary{background:linear-gradient(180deg,#FF7C48 0%,#F5330A 100%);color:#fff;text-shadow:0 1px 1px rgba(120,20,0,0.45);box-shadow:inset 0 1px 0 rgba(255,255,255,0.5),inset 0 -1px 0 rgba(120,20,0,0.3),0 3px 0 #B4260B,0 12px 26px -10px rgba(245,60,20,0.7)}
.btn--primary:hover{color:#fff;filter:brightness(1.05);transform:translateY(-1px);box-shadow:inset 0 1px 0 rgba(255,255,255,0.55),inset 0 -1px 0 rgba(120,20,0,0.3),0 4px 0 #B4260B,0 16px 34px -10px rgba(245,60,20,0.82)}
.btn--primary:active{transform:translateY(2px);box-shadow:inset 0 1px 0 rgba(255,255,255,0.4),0 1px 0 #B4260B,0 6px 14px -10px rgba(245,60,20,0.55)}
.btn--primary:hover>svg{transform:translateX(3px)}
.btn--secondary{background:var(--surface2,#242322);color:var(--text,#ECEBE9);border:1px solid var(--border,rgba(255,255,255,0.14));box-shadow:inset 0 1px 0 rgba(255,255,255,0.08),0 2px 0 rgba(0,0,0,0.22),0 10px 22px -14px rgba(0,0,0,0.6)}
.btn--secondary:hover{color:var(--text,#ECEBE9);transform:translateY(-1px);border-color:rgba(245,60,20,0.5);box-shadow:inset 0 1px 0 rgba(255,255,255,0.12),0 3px 0 rgba(0,0,0,0.22),0 14px 28px -14px rgba(0,0,0,0.72)}
.btn--secondary:active{transform:translateY(2px);box-shadow:inset 0 1px 0 rgba(255,255,255,0.06),0 1px 0 rgba(0,0,0,0.22)}
.btn--tertiary{background:transparent;color:var(--muted,#9a9993);box-shadow:none;padding-left:12px;padding-right:12px}
.btn--tertiary:hover{color:var(--text,#ECEBE9)}
.btn--tertiary:active{transform:translateY(1px)}
.btn:disabled,.btn[aria-disabled="true"]{cursor:not-allowed;pointer-events:none;background:var(--surface2,#242322);color:var(--faint,#6e6d6a);border:1px solid var(--border,rgba(255,255,255,0.08));box-shadow:none;filter:none;transform:none}
.btn--loading{color:transparent!important;pointer-events:none}
.btn--loading>svg{opacity:0}
.btn--loading::after{content:"";position:absolute;width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;animation:btn-spin .6s linear infinite}
.btn--secondary.btn--loading::after,.btn--tertiary.btn--loading::after{border-color:rgba(236,235,233,0.25);border-top-color:var(--text,#ECEBE9)}
@keyframes btn-spin{to{transform:rotate(360deg)}}
</style>
</helmet>

<div data-screen-label="Sign in" style="--bg:#141312;--surface:#1d1c1b;--surface2:#242322;--border:rgba(255,255,255,0.09);--text:#ECEBE9;--muted:#9a9993;--faint:#6e6d6a;--accent:#F5330A;font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:grid;grid-template-columns:1.05fr 1fr" class="si-grid">

  <!-- LEFT: brand / growth journey -->
  <div class="si-left" style="position:relative;overflow:hidden;border-right:1px solid var(--border);background:linear-gradient(160deg,#1b1a18 0%,#141312 60%);padding:clamp(32px,3.4vw,52px);display:flex;flex-direction:column;justify-content:space-between;min-height:100vh">
    <div aria-hidden="true" style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.022) 1px,transparent 1px);background-size:46px 46px;mask-image:radial-gradient(120% 90% at 30% 25%,#000 30%,transparent 80%);-webkit-mask-image:radial-gradient(120% 90% at 30% 25%,#000 30%,transparent 80%);pointer-events:none"></div>
    <div aria-hidden="true" style="position:absolute;top:-22%;left:-12%;width:60%;height:62%;background:radial-gradient(circle,rgba(245,60,20,0.20),transparent 66%);pointer-events:none"></div>
    <div aria-hidden="true" style="position:absolute;bottom:-24%;right:-14%;width:56%;height:56%;background:radial-gradient(circle,rgba(245,60,20,0.10),transparent 66%);pointer-events:none"></div>

    <a href="Opencanvas Workshop.dc.html" style="position:relative;display:flex;align-items:center;gap:10px;color:var(--text)">
      <img src="assets/academy-logo-full.png" alt="Academy" style="height:44px;width:auto;object-fit:contain;display:block" />
      <span style="font-weight:700;font-size:20px;letter-spacing:-0.02em">Academy</span>
    </a>

    <div style="position:relative;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;gap:34px;padding:clamp(24px,3vw,44px) 0">
      <div style="position:relative;width:400px;height:300px;max-width:100%">{{ stage }}</div>
      <div style="max-width:360px">
        <p style="margin:0;font-weight:700;font-size:clamp(22px,2.2vw,28px);line-height:1.1;letter-spacing:-0.03em;color:var(--text)">Learn. Practice. Build. Repeat.</p>
        <p style="margin:10px 0 0;font-size:14.5px;line-height:1.5;color:var(--muted)">Every workshop is another step toward becoming a better designer.</p>
      </div>
    </div>

  </div>

  <!-- RIGHT: sign-in form -->
  <div class="si-right" style="display:flex;align-items:center;justify-content:center;padding:clamp(28px,4vw,56px);min-height:100vh">
    <div style="width:100%;max-width:400px">
      <span style="display:inline-flex;align-items:center;gap:8px;background:rgba(245,60,20,0.12);color:var(--accent);font-weight:600;font-size:11.5px;letter-spacing:0.08em;padding:5px 11px;border-radius:999px;margin-bottom:22px"><span style="width:7px;height:7px;border-radius:999px;background:var(--accent)"></span>LIVE WORKSHOPS · ENROLLING NOW</span>
      <h1 style="margin:0 0 8px;font-weight:800;font-size:clamp(30px,3.4vw,38px);line-height:1.05;letter-spacing:-0.03em">Welcome back</h1>
      <p style="margin:0 0 30px;font-size:16px;color:var(--muted)">Sign in to keep building.</p>

      <div style="display:flex;flex-direction:column;gap:11px;margin-bottom:22px">
        <button type="button" onClick="{{ onGoogle }}" class="btn btn--secondary btn--lg btn--block">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.5 12.2c0-.7-.1-1.4-.2-2H12v3.8h5.9a5 5 0 0 1-2.2 3.3v2.7h3.6c2.1-2 3.2-4.9 3.2-7.8z"/><path fill="#34A853" d="M12 23c2.9 0 5.4-1 7.2-2.7l-3.6-2.7c-1 .7-2.3 1.1-3.6 1.1-2.8 0-5.1-1.9-6-4.4H2.3v2.8A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M6 14.3a6.6 6.6 0 0 1 0-4.2V7.3H2.3a11 11 0 0 0 0 9.9L6 14.3z"/><path fill="#EA4335" d="M12 5.5c1.6 0 3 .5 4.1 1.6l3.1-3.1A11 11 0 0 0 2.3 7.3L6 10.1c.9-2.6 3.2-4.6 6-4.6z"/></svg>
          Continue with Google
        </button>
        <button type="button" class="btn btn--secondary btn--lg btn--block">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#0A66C2"><path d="M20.5 2h-17A1.5 1.5 0 0 0 2 3.5v17A1.5 1.5 0 0 0 3.5 22h17a1.5 1.5 0 0 0 1.5-1.5v-17A1.5 1.5 0 0 0 20.5 2zM8 19H5V9h3v10zM6.5 7.7a1.8 1.8 0 1 1 0-3.5 1.8 1.8 0 0 1 0 3.5zM19 19h-3v-5c0-1.2-.5-2-1.6-2-.9 0-1.4.6-1.6 1.2-.1.2-.1.5-.1.8V19h-3V9h3v1.3c.4-.7 1.2-1.6 3-1.6 2.2 0 3.9 1.4 3.9 4.5V19z"/></svg>
          Continue with LinkedIn
        </button>
      </div>

      <div style="display:flex;align-items:center;gap:14px;margin-bottom:22px">
        <span style="flex:1;height:1px;background:var(--border)"></span>
        <span style="color:var(--faint);font-size:12.5px;letter-spacing:0.06em">or use email</span>
        <span style="flex:1;height:1px;background:var(--border)"></span>
      </div>

      <form onSubmit="{{ onSubmit }}" style="display:flex;flex-direction:column;gap:16px">
        <label style="display:block">
          <span style="display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px">Email</span>
          <input type="email" required placeholder="you@studio.com" style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:15px;font-family:inherit;padding:13px 14px;border-radius:12px" />
        </label>
        <label style="display:block">
          <span style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px"><span style="font-size:13px;font-weight:600;color:var(--muted)">Password</span><a href="#" style="font-size:12.5px;font-weight:500">Forgot?</a></span>
          <input type="password" required placeholder="••••••••" style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:15px;font-family:inherit;padding:13px 14px;border-radius:12px" />
        </label>
        <button type="submit" class="btn btn--primary btn--lg btn--block">
          Sign in
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="18" y2="12"/><polyline points="12 6 18 12 12 18"/></svg>
        </button>
      </form>

      <p style="margin:24px 0 0;text-align:center;font-size:14.5px;color:var(--muted)">New here? <a href="Onboarding.dc.html" style="font-weight:600">Create an account</a></p>
    </div>
  </div>

</div>
</x-dc>

      key: mode + idx, className: mode === 'in' ? 'lj-in' : 'lj-out',
      style: { position: 'absolute', inset: 0, borderRadius: '20px', overflow: 'hidden', background: 'linear-gradient(165deg,rgba(32,30,28,0.74),rgba(19,18,17,0.86))', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', boxShadow: '0 34px 80px -36px rgba(0,0,0,0.85)' },
    }, [glow, content, border]);
  }

  renderVals() {
    const h = React.createElement;
    const layers = [];
    if (this.state.prev !== null && this.state.prev !== this.state.i) layers.push(this.buildCard(this.state.prev, 'out'));
    layers.push(this.buildCard(this.state.i, 'in'));
    const stage = h('div', { style: { position: 'absolute', inset: 0 } }, layers);
    return {
      stage,
      onSubmit: (e) => { e.preventDefault(); this.go('Onboarding.dc.html'); },
      onGoogle: () => this.go('Onboarding.dc.html'),
    };
  }
}
</script>
